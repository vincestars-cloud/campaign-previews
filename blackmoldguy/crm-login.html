<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — The Black Mold Guy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);padding:40px 36px;max-width:420px;width:100%;text-align:center}
.logo{width:60px;height:60px;background:#1a3a2a;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.subtitle{color:#6b7280;font-size:15px;margin-bottom:32px;line-height:1.5}
.form-group{text-align:left;margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s}
input:focus{border-color:#1a3a2a}
.btn{width:100%;padding:16px;background:#1a3a2a;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:hover{background:#0f2318}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.success-state{display:none}
.success-icon{font-size:48px;margin-bottom:16px}
.success-title{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.success-body{color:#6b7280;font-size:15px;line-height:1.6}
.divider{border:none;border-top:1px solid #f0f0f0;margin:24px 0}
.help-text{font-size:13px;color:#9ca3af}
.help-text a{color:#1a3a2a;text-decoration:none;font-weight:600}
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none;text-align:left}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <h1>Owner Dashboard</h1>
  <p class="subtitle">Enter your email to receive a secure login link.</p>

  <div id="login-form">
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group">
      <label for="email">Your Email Address</label>
      <input type="email" id="email" placeholder="starsvince@gmail.com" autocomplete="email">
    </div>
    <button class="btn" id="submit-btn" onclick="sendMagicLink()">
      <span id="btn-text">Send Login Link</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <hr class="divider">
    <p class="help-text">Need help? Call <a href="tel:3058490242">305-849-0242</a></p>
  </div>

  <div class="success-state" id="success-state">
    <div class="success-icon">📧</div>
    <div class="success-title">Check your inbox!</div>
    <p class="success-body">Login link sent to <strong id="sent-email"></strong>. Check your email and click the button — it's valid for 24 hours.</p>
    <hr class="divider">
    <p class="help-text">Didn't get it? <a href="#" onclick="reset()">Try again</a></p>
  </div>
</div>

<script>
// Authorized owner emails
const AUTHORIZED_EMAILS = [
  'starsvince@gmail.com',
  'vince@inleap.ai',
  'theblackmoldguy@gmail.com'
];

const SECRET = 'BMGowner2024!';

// If already logged in, go straight to CRM
if (localStorage.getItem('bmg_session') === SECRET) {
  window.location.replace('crm.html');
}

function sendMagicLink() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!email) {
    errEl.textContent = 'Please enter your email address.';
    errEl.style.display = 'block';
    return;
  }

  // Validate it's an authorized email
  if (!AUTHORIZED_EMAILS.includes(email)) {
    errEl.textContent = 'This email is not authorized. Use your owner email address.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';

  const token = btoa(email + ':' + SECRET);
  const magicLink = `https://vincestars-cloud.github.io/campaign-previews/blackmoldguy/crm.html?access=${encodeURIComponent(token)}`;

  fetch('https://n8n.americanlifeteam.com/webhook/bmg-send-email', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      to_email: email,
      subject: 'Your Black Mold Guy Dashboard — Login Link',
      html: `<div style="font-family:sans-serif;max-width:520px;margin:0 auto;padding:32px">
        <div style="background:#1a3a2a;padding:24px;border-radius:12px 12px 0 0;text-align:center">
          <div style="font-size:28px;margin-bottom:8px">🌿</div>
          <h2 style="color:white;margin:0;font-size:20px">The Black Mold Guy</h2>
          <p style="color:rgba(255,255,255,0.6);margin:4px 0 0;font-size:13px">Owner Dashboard</p>
        </div>
        <div style="background:white;padding:32px;border-radius:0 0 12px 12px;border:1px solid #e5e7eb;border-top:none">
          <h3 style="color:#1a1a1a;margin:0 0 8px">Here's your login link</h3>
          <p style="color:#6b7280;margin:0 0 28px;font-size:14px;line-height:1.6">Click the button below to open your dashboard. This link works for 24 hours.</p>
          <a href="${magicLink}" style="display:block;text-align:center;background:#1a3a2a;color:white;padding:16px;border-radius:10px;text-decoration:none;font-weight:700;font-size:16px">Open My Dashboard →</a>
          <p style="color:#9ca3af;font-size:12px;margin:20px 0 0;text-align:center">If you didn't request this, you can ignore it.</p>
        </div>
      </div>`
    })
  })
  .then(() => {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('sent-email').textContent = email;
    document.getElementById('success-state').style.display = 'block';
  })
  .catch(() => {
    errEl.textContent = 'Could not send email. Try again or use your saved dashboard link.';
    errEl.style.display = 'block';
    btn.disabled = false;
    document.getElementById('btn-text').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
  });
}

function reset() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('success-state').style.display = 'none';
  document.getElementById('email').value = '';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  document.getElementById('btn-text').style.display = 'block';
  document.getElementById('spinner').style.display = 'none';
}

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMagicLink();
});
</script>
</body>
</html>
