  let currentFilter = 'all';

  function filterAds(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.period-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderAds();
  }

  function renderAds() {
    const filtered = currentFilter === 'all' ? ads : ads.filter(a => a.channel === currentFilter);
    const groups = {};
    filtered.forEach(ad => {
      if (!groups[ad.channelLabel]) groups[ad.channelLabel] = {color:ad.channelColor, ads:[]};
      groups[ad.channelLabel].ads.push(ad);
    });

    document.getElementById('ads-container').innerHTML = Object.entries(groups).map(([label, group]) => `
      <div class="section-title" style="display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:${group.color};display:inline-block;"></span>
        ${label}
        <span style="font-size:12px;color:var(--text-muted);font-weight:400;font-family:var(--sans);">${group.ads.length} ad${group.ads.length>1?'s':''}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px;">
        ${group.ads.map(ad => renderAdCard(ad)).join('')}
      </div>
    `).join('');
  }

        <div style="padding:12px 16px;display:flex;align-items:center;gap:10px;">

          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;color:var(--dark);">Coastal Shield Roofing</div>
            <div style="font-size:12px;color:var(--text-muted);">Sponsored</div>
          </div>
          <span class="badge ${ad.status==='Running'?'badge-green':'badge-gray'}">${ad.status}</span>
        </div>

            <div style="font-size:14px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ad.headline}</div>

          <div><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">CTR</span><div style="font-family:var(--mono);font-weight:500;font-size:15px;">${ad.ctr}</div></div>

          <div><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">CTR</span><div style="font-family:var(--mono);font-weight:500;font-size:15px;">${ad.ctr}</div></div>

      ${ad.primaryText ? `<div style="background:var(--bg);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;">

      </div>` : ''}

      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:6px;">${isDigital ? 'Ad Description' : 'Call Script'}</div>

      ${ad.pauseReason ? `<div style="background:var(--yellow-light);border:1px solid #FDE68A;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;">

          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Leads</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.leads}</div></div>
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">CTR</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--green);">${ad.ctr}</div></div>
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Cost/Lead</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.cpa}</div></div>
        ` : `
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Calls</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.callsMade}</div></div>
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Connected</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.connected}</div></div>
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Leads</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.leads}</div></div>
          <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Avg Call</div><div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--dark);">${ad.avgDuration}</div></div>
        `}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:3px;">Spend</div><div style="font-family:var(--mono);font-size:15px;font-weight:500;color:var(--dark);">${ad.spend}</div></div>
        <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:3px;">Started</div><div style="font-size:14px;font-weight:600;color:var(--dark);">${ad.startDate}</div></div>
      </div>

      ${ad.keywords ? `<div style="margin-bottom:16px;">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Target Keywords</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${ad.keywords.map(k => '<span class="badge badge-blue">'+k+'</span>').join('')}</div>
      </div>` : ''}

      ${ad.placement ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:3px;">Placements</div><div style="font-size:13px;font-weight:500;color:var(--dark);">${ad.placement}</div></div>
        <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:3px;">Audience</div><div style="font-size:13px;font-weight:500;color:var(--dark);">${ad.audience}</div></div>
      </div>` : ''}

      ${ad.landingPage ? `<div style="background:var(--accent-light);padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;">
        <strong style="color:var(--accent);">Landing Page:</strong> <span style="color:var(--text);">${ad.landingPage}</span>
      </div>` : ''}
    `;
    document.getElementById('adDetailModal').classList.add('open');
  }

  function closeModal() { document.getElementById('adDetailModal').classList.remove('open'); }
  document.getElementById('adDetailModal').addEventListener('click', e => { if (e.target.id === 'adDetailModal') closeModal(); });

  renderAds();
</script>

<!-- v2 - sidebar nav, Facebook ad card format matching Meta Ad Library -->
</body>
</html>
