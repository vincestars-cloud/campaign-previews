<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Black Mold Guy CRM</title>
<style>
:root{--sage:#2d4a3a;--sage-2:#4a6b5a;--cream:#f7f5f0;--ink:#0a0f0d;--mute:#7a8275}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #e5e2db;border-radius:18px;max-width:420px;width:100%;padding:40px 32px;box-shadow:0 12px 40px rgba(0,0,0,.04)}
.logo{font-family:Georgia,serif;font-size:22px;color:var(--sage);text-align:center;margin-bottom:4px}
.tag{text-align:center;font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--sage-2);font-weight:600;margin-bottom:32px}
h1{font-family:Georgia,serif;font-size:24px;margin:0 0 8px;line-height:1.25}
p{font-size:14.5px;color:var(--mute);margin:0 0 24px;line-height:1.6}
label{font-size:12.5px;font-weight:600;color:#374151;display:block;margin-bottom:6px}
input[type=email]{width:100%;padding:14px 16px;border:1.5px solid #d6d2c8;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
input[type=email]:focus{border-color:var(--sage-2)}
button{width:100%;background:var(--sage);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:16px;transition:background .15s}
button:hover{background:var(--sage-2)}
button:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:18px;padding:14px 16px;border-radius:10px;font-size:14px;line-height:1.5;display:none}
.msg.ok{background:#dcf5e1;color:#1e5d2c;display:block}
.msg.err{background:#fde8e8;color:#9b1c1c;display:block}
.hint{margin-top:18px;font-size:12.5px;color:var(--mute);text-align:center;line-height:1.6}
</style>
</head>
<body>
<form class="card" onsubmit="event.preventDefault(); signIn()">
  <div class="logo">The Black Mold Guy</div>
  <div class="tag">Operator Sign In</div>
  <h1>Welcome back, Deonco.</h1>
  <p>Enter your email and we'll send you a one-click magic link. No password to remember.</p>
  <label for="email">Email</label>
  <input id="email" type="email" required autocomplete="email" placeholder="you@theblackmoldguy.com">
  <button id="btn" type="submit">Send magic link</button>
  <div id="msg" class="msg"></div>
  <div class="hint">Trouble signing in? Text Vince at 678-404-0309.</div>
</form>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL  = "REPLACE_WITH_YOUR_SUPABASE_URL";
const SUPABASE_ANON = "REPLACE_WITH_YOUR_ANON_KEY";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
window.signIn = async () => {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.className = 'msg'; msg.textContent = '';
  if (!email) return;
  btn.disabled = true; btn.textContent = 'Sending...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.origin + '/campaign-previews/blackmoldguy-crm/' }
  });
  btn.disabled = false; btn.textContent = 'Send magic link';
  if (error) { msg.className = 'msg err'; msg.textContent = error.message; }
  else { msg.className = 'msg ok'; msg.textContent = 'Check your email. Click the link to sign in.'; }
};
// If already signed in, send straight to dashboard
const { data: { session } } = await sb.auth.getSession();
if (session) location.replace('../');
</script>
</body>
</html>
